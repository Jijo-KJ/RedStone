<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Redstone Oman</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #111 url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
      color: white;
    }

    nav {
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 80px;
      padding: 0 2rem;
      border-bottom: 1px solid #ddd;
    }

    .logo img {
      height: 150px;
      object-fit: contain;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: #000;
      font-weight: 600;
    }

    .nav-links a.active {
      border-bottom: 2px solid #a50000;
      color: #a50000;
    }

    .nav-links a:hover {
      color: #a50000;
      border-bottom: 2px solid #a50000;
    }

    .contact-section {
      max-width: 600px;
      margin: 100px auto;
      background: rgba(255, 255, 255, 0.05);
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
    }

    .contact-section h2 {
      text-align: center;
      color: #a50000;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    label {
      font-weight: 600;
    }

    input, textarea {
      padding: 0.8rem;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      background: #222;
      color: white;
    }

    input::placeholder, textarea::placeholder {
      color: #aaa;
    }

    button {
      padding: 0.8rem;
      background: #a50000;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #ff0000;
    }

    @media (max-width: 600px) {
      .contact-section {
        margin: 50px 20px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">
      <a href="redstonehome.html"><img src="images/logo.png" alt="Redstone Logo"></a>
    </div>
    <div class="nav-links">
      <a href="redstonehome.html">HOME</a>
      <a href="about.html" class="active">ABOUT US</a>
      <a href="services.html">SERVICES</a>
      <a href="clients.html">CLIENTS</a>
      <a href="contact.html">CONTACT US</a>
    </div>
  </nav>

  <section class="contact-section">
    <h2>Get in Touch</h2>
    <form action="https://formspree.io/f/mdkzyqgv" method="POST">
  <input type="text" name="name" placeholder="Your Name" required />
  <input type="email" name="_replyto" placeholder="Your Email" required />
  <textarea name="message" placeholder="Your Message" required></textarea>
  <button type="submit">Send Message</button>
</form>

  </section>

</body>
</html>
